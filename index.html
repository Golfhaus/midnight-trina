<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonight?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --dusk-1: #191a37;
    --dusk-2: #4a3564;
    --dusk-3: #d9667a;
    --amber: #ffb454;
    --amber-dim: #ffb45455;
    --cream: #fbf3e7;
    --ink: #241c30;
    --card: #ffffff;
    --card-line: #eee3d6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Work Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
  }

  .sky {
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--dusk-1) 0%, var(--dusk-2) 55%, var(--dusk-3) 100%);
    background-size: 100% 220%;
    animation: driftSky 26s ease-in-out infinite alternate;
    padding: 28px 20px 40px;
    color: var(--cream);
  }

  @keyframes driftSky {
    0% { background-position: 0% 0%; }
    100% { background-position: 0% 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sky { animation: none; }
  }

  .sky::after {
    content: "";
    position: absolute;
    right: -40px;
    bottom: -60px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--amber) 0%, #ffb45400 70%);
    opacity: 0.55;
  }

  .header-row {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    max-width: 520px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.2rem, 8vw, 2.8rem);
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .date-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    background: #00000030;
    border: 1px solid #ffffff30;
    padding: 5px 10px;
    border-radius: 999px;
    white-space: nowrap;
    margin-bottom: 6px;
  }

  main {
    max-width: 520px;
    margin: -20px auto 0;
    padding: 0 20px 60px;
    position: relative;
    z-index: 1;
  }

  .tabs {
    display: flex;
    background: var(--card);
    border-radius: 14px;
    padding: 4px;
    box-shadow: 0 6px 20px -8px #00000040;
    margin-bottom: 20px;
  }

  .poll-title {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
    margin: -8px 0 20px;
    padding: 0 6px;
  }

  .sync-banner {
    background: #fff2e0;
    border: 1.5px solid #f0c896;
    color: #8a5a1f;
    font-size: 0.82rem;
    font-weight: 500;
    text-align: center;
    padding: 10px 14px;
    border-radius: 12px;
    margin: -8px 0 20px;
  }

  .setup-banner {
    background: #fde8e8;
    border: 1.5px solid #f0aeae;
    color: #8a1f1f;
    font-size: 0.85rem;
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .tab {
    flex: 1;
    border: none;
    background: transparent;
    padding: 11px 8px;
    border-radius: 10px;
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    color: #8a7f95;
    cursor: pointer;
  }

  .tab.active {
    background: var(--ink);
    color: var(--cream);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-line);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #8a7f95;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--card-line);
    font-family: 'Work Sans', sans-serif;
    font-size: 0.95rem;
    background: #fffdfa;
    color: var(--ink);
  }

  input:focus {
    outline: 2px solid var(--amber);
    outline-offset: 1px;
  }

  .option {
    display: block;
    width: 100%;
    text-align: left;
    border: 1.5px solid var(--card-line);
    background: #fffdfa;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    font-family: 'Work Sans', sans-serif;
  }

  .option.selected {
    border-color: var(--amber);
    background: #fff6e8;
  }

  .option-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 1rem;
  }

  .option-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: #8a7f95;
  }

  .bar-track {
    height: 6px;
    background: #efe6da;
    border-radius: 999px;
    margin-top: 10px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--dusk-3));
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .voter-names {
    margin-top: 8px;
    font-size: 0.82rem;
    color: #a89bb0;
  }

  button.primary {
    width: 100%;
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 13px;
    border-radius: 12px;
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 4px;
  }

  button.primary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  button.ghost {
    width: 100%;
    background: transparent;
    color: #b0455c;
    border: 1.5px solid #eddadf;
    padding: 11px;
    border-radius: 12px;
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 8px;
  }

  .opt-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .opt-row input { flex: 1; }

  .remove-btn, .vote-remove-btn {
    border: 1.5px solid var(--card-line);
    background: #fff;
    border-radius: 10px;
    width: 42px;
    font-size: 1.1rem;
    color: #b0455c;
    cursor: pointer;
  }

  .add-btn {
    width: 100%;
    border: 1.5px dashed var(--card-line);
    background: transparent;
    border-radius: 10px;
    padding: 10px;
    color: #8a7f95;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
  }

  .empty-state {
    text-align: center;
    padding: 24px 10px;
    color: #a89bb0;
    font-size: 0.92rem;
  }

  .status-line {
    text-align: center;
    font-size: 0.8rem;
    color: #a89bb0;
    margin-top: 6px;
    min-height: 1.2em;
  }

  .locked-hint {
    font-size: 0.82rem;
    color: #a89bb0;
    margin-top: -4px;
    margin-bottom: 14px;
  }

  .history-day {
    border-bottom: 1px solid var(--card-line);
    padding: 14px 0;
  }

  .history-day:last-child {
    border-bottom: none;
  }

  .history-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: #a89bb0;
    margin-bottom: 4px;
  }

  .history-winner {
    font-weight: 600;
    font-size: 1rem;
  }

  .history-tie {
    color: #b0455c;
    font-size: 0.8rem;
    font-weight: 600;
    margin-left: 6px;
  }

  .history-count {
    font-size: 0.82rem;
    color: #a89bb0;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="sky">
  <div class="header-row">
    <h1>Tonight?</h1>
    <div class="date-badge" id="dateBadge">—</div>
  </div>
</div>

<main>
  <div id="setupBanner" class="setup-banner" style="display:none;"></div>

  <div class="tabs">
    <button class="tab active" id="tabVote">Vote</button>
    <button class="tab" id="tabHistory">History</button>
    <button class="tab" id="tabPlan">Admin</button>
  </div>

  <div class="sync-banner" id="syncBanner" style="display:none;"></div>
  <div class="poll-title" id="pollTitleBar" style="display:none;"></div>

  <div id="voteView"></div>
  <div id="planView" style="display:none;"></div>
  <div id="historyView" style="display:none;"></div>
</main>

<script>
  // ==================================================================
  // SETUP — fill these in before uploading, see the Supabase section
  // of your project dashboard: Settings > API
  // ==================================================================
  const SUPABASE_URL = 'https://qxiqutjbedubxalwvodb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4aXF1dGpiZWR1YnhhbHd2b2RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzA0ODQsImV4cCI6MjA5ODc0NjQ4NH0.5puxKIrBKuDn4S672JnzeFiQbJQAdSVtChKcfnCudSE'; // the "anon public" key
  const ADMIN_PASSCODE = 'Eric77';                   // change this to your own passcode
  // ==================================================================

  const supabaseReady = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
  const sb = supabaseReady ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  if (!supabaseReady) {
    const banner = document.getElementById('setupBanner');
    banner.style.display = 'block';
    banner.innerHTML = 'This app isn\'t connected to a database yet. Edit the SUPABASE_URL and SUPABASE_ANON_KEY constants near the top of the &lt;script&gt; tag in this file, then re-upload.';
  }

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function todayLabel() {
    const d = new Date();
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  const dayKey = todayKey();
  document.getElementById('dateBadge').textContent = todayLabel();

  let pollData = { title: '', options: [], votes: {} };
  let selectedOptionIndex = null;
  let voterNames = [''];
  let unlocked = false;
  let editingOptions = [];
  let editingTitle = '';
  const MAX_VOTERS = 4;

  let hasLoadedOnce = false;
  let syncOk = true;
  let currentTab = 'vote';

  function updateSyncBanner() {
    const banner = document.getElementById('syncBanner');
    if (!banner) return;
    if (!syncOk && currentTab === 'plan') {
      banner.textContent = "⚠️ Not syncing right now — what you see may not match what others see. Try reloading in a moment.";
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none';
    }
  }

  function setSyncStatus(ok) {
    syncOk = ok;
    updateSyncBanner();
  }

  async function withRetry(fn) {
    let lastErr;
    for (const delay of [0, 600, 1500]) {
      if (delay) await new Promise(r => setTimeout(r, delay));
      try {
        return await fn();
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr;
  }

  // Loads today's row. Returns { title, options, votes } or defaults if
  // no row exists yet for today.
  async function loadPoll(onFailure) {
    if (!supabaseReady) return;
    try {
      const { data, error } = await withRetry(() =>
        sb.from('poll_days').select('title, options, votes').eq('day', dayKey).maybeSingle()
      );
      if (error) throw error;
      pollData = data
        ? { title: data.title || '', options: data.options || [], votes: data.votes || {} }
        : { title: '', options: [], votes: {} };
      hasLoadedOnce = true;
      setSyncStatus(true);
    } catch (e) {
      if (!hasLoadedOnce) {
        pollData = { title: '', options: [], votes: {} };
        hasLoadedOnce = true;
      } else {
        setSyncStatus(false);
        if (typeof onFailure === 'function') onFailure(e);
      }
    }
  }

  // Upserts today's row with the given data. Returns true only on confirmed success.
  async function savePoll(dataToSave) {
    if (!supabaseReady) return false;
    try {
      const { error } = await withRetry(() =>
        sb.from('poll_days').upsert({
          day: dayKey,
          title: dataToSave.title,
          options: dataToSave.options,
          votes: dataToSave.votes,
          updated_at: new Date().toISOString()
        }, { onConflict: 'day' })
      );
      if (error) throw error;
      setSyncStatus(true);
      return true;
    } catch (e) {
      setSyncStatus(false);
      return false;
    }
  }

  function tallyFor(index) {
    return Object.values(pollData.votes).filter(v => v === index).length;
  }

  function namesFor(index) {
    return Object.entries(pollData.votes).filter(([, v]) => v === index).map(([name]) => name);
  }

  function maxTally() {
    if (!pollData.options.length) return 0;
    return Math.max(1, ...pollData.options.map((_, i) => tallyFor(i)));
  }

  function renderTitleBar() {
    const bar = document.getElementById('pollTitleBar');
    if (pollData.title && pollData.title.trim()) {
      bar.textContent = pollData.title.trim();
      bar.style.display = 'block';
    } else {
      bar.style.display = 'none';
    }
  }

  function renderVoteView() {
    const el = document.getElementById('voteView');
    renderTitleBar();

    if (!pollData.options.length) {
      el.innerHTML = `
        <div class="card">
          <div class="empty-state">No plans set for tonight yet — head to "Admin" to add options.</div>
          <button class="ghost" id="refreshPageBtn">Refresh page</button>
        </div>`;
      document.getElementById('refreshPageBtn').addEventListener('click', () => location.reload());
      return;
    }

    const top = maxTally();
    let optionsHtml = pollData.options.map((opt, i) => {
      const count = tallyFor(i);
      const names = namesFor(i);
      const pct = top ? Math.round((count / top) * 100) : 0;
      const isSelected = selectedOptionIndex === i;
      return `
        <button class="option ${isSelected ? 'selected' : ''}" data-index="${i}">
          <div class="option-top">
            <span>${escapeHtml(opt)}</span>
            <span class="option-count">${count}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          ${names.length ? `<div class="voter-names">${names.map(escapeHtml).join(', ')}</div>` : ''}
        </button>`;
    }).join('');

    const nameRows = voterNames.map((name, i) => `
      <div class="opt-row">
        <input type="text" data-index="${i}" class="voterNameInput" placeholder="${i === 0 ? 'e.g. Jordan' : 'e.g. spouse or roommate'}" value="${escapeHtml(name)}" />
        ${voterNames.length > 1 ? `<button class="remove-btn" data-index="${i}" title="Remove">×</button>` : ''}
      </div>
    `).join('');

    el.innerHTML = `
      <div class="card">
        ${optionsHtml}
      </div>
      <div class="card">
        <label>Voting for (up to ${MAX_VOTERS} people)</label>
        <div class="locked-hint">Add everyone you're voting on behalf of — spouse, kids, random dude you met at Publix.</div>
        ${nameRows}
        ${voterNames.length < MAX_VOTERS ? `<button class="add-btn" id="addVoterBtn">+ <strong>Add another person</strong></button>` : ''}
        <button class="primary" id="submitVoteBtn">Submit vote</button>
        <div class="status-line" id="voteStatus"></div>
        <button class="ghost" id="refreshPageBtn">Refresh page</button>
      </div>
    `;

    el.querySelectorAll('.voterNameInput').forEach(inp => {
      inp.addEventListener('input', (e) => {
        voterNames[parseInt(e.target.dataset.index, 10)] = e.target.value;
      });
    });

    el.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index, 10);
        voterNames.splice(idx, 1);
        if (!voterNames.length) voterNames = [''];
        renderVoteView();
      });
    });

    const addVoterBtn = document.getElementById('addVoterBtn');
    if (addVoterBtn) {
      addVoterBtn.addEventListener('click', () => {
        if (voterNames.length < MAX_VOTERS) {
          voterNames.push('');
          renderVoteView();
        }
      });
    }

    el.querySelectorAll('.option').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedOptionIndex = parseInt(btn.dataset.index, 10);
        renderVoteView();
      });
    });

    document.getElementById('submitVoteBtn').addEventListener('click', submitVote);
    document.getElementById('refreshPageBtn').addEventListener('click', () => location.reload());
  }

  async function submitVote() {
    const status = document.getElementById('voteStatus');
    const names = voterNames.map(n => n.trim()).filter(Boolean);
    if (!names.length) {
      status.textContent = 'Add at least one name first.';
      return;
    }
    if (selectedOptionIndex === null) {
      status.textContent = 'Pick an option first.';
      return;
    }
    status.textContent = 'Saving...';
    await loadPoll();
    const attempted = { ...pollData, votes: { ...pollData.votes } };
    names.forEach(name => {
      attempted.votes[name] = selectedOptionIndex;
    });
    const saved = await savePoll(attempted);
    if (saved) {
      pollData = attempted;
      status.textContent = names.length > 1 ? `${names.length} votes in! You can change them any time.` : 'Vote in! You can change it any time.';
    } else {
      status.textContent = 'Could not save your vote — check your connection and try again.';
    }
    renderVoteView();
  }

  function renderPlanView() {
    const el = document.getElementById('planView');

    if (!unlocked) {
      el.innerHTML = `
        <div class="card">
          <label for="passInput">Passcode</label>
          <input type="password" id="passInput" placeholder="Enter passcode" />
          <button class="primary" id="unlockBtn" style="margin-top:12px;">Unlock</button>
          <div class="status-line" id="lockStatus"></div>
        </div>`;
      document.getElementById('unlockBtn').addEventListener('click', () => {
        const val = document.getElementById('passInput').value;
        if (val === ADMIN_PASSCODE) {
          unlocked = true;
          editingOptions = pollData.options.length ? [...pollData.options] : [''];
          editingTitle = pollData.title || '';
          renderPlanView();
        } else {
          document.getElementById('lockStatus').textContent = 'Wrong passcode.';
        }
      });
      return;
    }

    const rows = editingOptions.map((opt, i) => `
      <div class="opt-row">
        <input type="text" data-index="${i}" class="optEdit" placeholder="Option ${i + 1}" value="${escapeHtml(opt)}" />
        <button class="remove-btn" data-index="${i}" title="Remove">×</button>
      </div>
    `).join('');

    const voteEntries = Object.entries(pollData.votes);
    const votesListHtml = voteEntries.length
      ? voteEntries.map(([name, idx]) => `
          <div class="opt-row">
            <div style="flex:1; padding: 4px 2px;">
              <div style="font-weight:600;">${escapeHtml(name)}</div>
              <div style="font-size:0.8rem; color:#a89bb0;">${escapeHtml(pollData.options[idx] !== undefined ? pollData.options[idx] : 'Unknown option')}</div>
            </div>
            <button class="vote-remove-btn" data-name="${escapeHtml(name)}" title="Delete vote">×</button>
          </div>
        `).join('')
      : `<div class="empty-state" style="padding:10px 0;">No votes yet today.</div>`;

    el.innerHTML = `
      <div class="card">
        <label for="titleInput">Question title (optional)</label>
        <input type="text" id="titleInput" placeholder="e.g. What are we doing tonight?" value="${escapeHtml(editingTitle)}" />
      </div>
      <div class="card">
        <label>Tonight's options</label>
        <div class="locked-hint">Editing won't clear votes already cast — only removed options lose their votes.</div>
        ${rows}
        <button class="add-btn" id="addOptBtn">+ Add option</button>
        <button class="primary" id="saveOptsBtn">Save options</button>
        <div class="status-line" id="planStatus"></div>
        <button class="ghost" id="clearVotesBtn">Clear all votes for today</button>
        <button class="ghost" id="clearAllBtn">Reset today's plan (title, options &amp; votes)</button>
      </div>
      <div class="card">
        <label>Today's votes</label>
        ${votesListHtml}
      </div>
    `;

    document.getElementById('titleInput').addEventListener('input', (e) => {
      editingTitle = e.target.value;
    });

    el.querySelectorAll('.optEdit').forEach(inp => {
      inp.addEventListener('input', (e) => {
        editingOptions[parseInt(e.target.dataset.index, 10)] = e.target.value;
      });
    });

    el.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index, 10);
        editingOptions.splice(idx, 1);
        if (!editingOptions.length) editingOptions = [''];
        renderPlanView();
      });
    });

    document.getElementById('addOptBtn').addEventListener('click', () => {
      editingOptions.push('');
      renderPlanView();
    });

    document.getElementById('saveOptsBtn').addEventListener('click', saveOptions);
    document.getElementById('clearVotesBtn').addEventListener('click', clearVotes);
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);

    el.querySelectorAll('.vote-remove-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteVote(btn.dataset.name));
    });
  }

  async function deleteVote(name) {
    const attempted = { ...pollData, votes: { ...pollData.votes } };
    delete attempted.votes[name];
    const saved = await savePoll(attempted);
    if (saved) pollData = attempted;
    renderPlanView();
    document.getElementById('planStatus').textContent = saved ? `Removed ${name}'s vote.` : 'Could not save — check your connection and try again.';
    renderVoteView();
  }

  async function saveOptions() {
    const status = document.getElementById('planStatus');
    const cleaned = editingOptions.map(o => o.trim()).filter(Boolean);
    if (!cleaned.length) {
      status.textContent = 'Add at least one option.';
      return;
    }
    status.textContent = 'Saving...';
    await loadPoll();

    const oldOptions = pollData.options;
    const newVotes = {};
    Object.entries(pollData.votes).forEach(([name, idx]) => {
      const text = oldOptions[idx];
      const newIdx = cleaned.indexOf(text);
      if (newIdx !== -1) newVotes[name] = newIdx;
    });

    const attempted = { title: editingTitle.trim(), options: cleaned, votes: newVotes };
    const saved = await savePoll(attempted);
    if (saved) {
      pollData = attempted;
      status.textContent = 'Saved.';
      editingOptions = [...cleaned];
    } else {
      status.textContent = 'Could not save — your edits are still here, tap Save options to retry.';
    }
    renderVoteView();
  }

  async function clearVotes() {
    await loadPoll();
    const attempted = { ...pollData, votes: {} };
    const saved = await savePoll(attempted);
    if (saved) pollData = attempted;
    document.getElementById('planStatus').textContent = saved ? 'Votes cleared.' : 'Could not save — check your connection and try again.';
    renderVoteView();
  }

  async function clearAll() {
    const attempted = { title: '', options: [], votes: {} };
    const saved = await savePoll(attempted);
    if (saved) {
      pollData = attempted;
      editingOptions = [''];
      editingTitle = '';
    }
    renderPlanView();
    document.getElementById('planStatus').textContent = saved ? 'Today\'s plan reset.' : 'Could not save — check your connection and try again.';
    renderVoteView();
  }

  // ---- History ----

  function computeWinner(options, votes) {
    if (!options.length) return null;
    const counts = options.map((_, i) => Object.values(votes).filter(v => v === i).length);
    const max = Math.max(...counts);
    if (max === 0) return { text: null, count: 0, tie: false };
    const winners = options.filter((_, i) => counts[i] === max);
    return { text: winners.join(' & '), count: max, tie: winners.length > 1 };
  }

  async function renderHistoryView() {
    const el = document.getElementById('historyView');
    if (!supabaseReady) {
      el.innerHTML = `<div class="card"><div class="empty-state">Connect a database to see history.</div></div>`;
      return;
    }
    el.innerHTML = `<div class="card"><div class="empty-state">Loading history...</div></div>`;
    try {
      const { data, error } = await withRetry(() =>
        sb.from('poll_days').select('day, title, options, votes').neq('day', dayKey).order('day', { ascending: false }).limit(30)
      );
      if (error) throw error;
      if (!data || !data.length) {
        el.innerHTML = `<div class="card"><div class="empty-state">No past nights logged yet — history fills in automatically as days go by.</div></div>`;
        return;
      }
      const rows = data.map(row => {
        const options = row.options || [];
        const votes = row.votes || {};
        const winner = computeWinner(options, votes);
        const totalVoters = Object.keys(votes).length;
        const dateLabel = new Date(row.day + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        let body;
        if (!options.length) {
          body = `<div class="empty-state" style="padding:4px 0;">No plan set that day</div>`;
        } else if (!winner.count) {
          body = `<div class="empty-state" style="padding:4px 0;">No votes cast that day</div>`;
        } else {
          body = `
            <div class="history-winner">${escapeHtml(winner.text)}${winner.tie ? '<span class="history-tie">TIE</span>' : ''}</div>
            <div class="history-count">${winner.count} vote${winner.count === 1 ? '' : 's'} · ${totalVoters} ${totalVoters === 1 ? 'person' : 'people'} voted</div>
          `;
        }
        return `
          <div class="history-day">
            <div class="history-date">${dateLabel}${row.title ? ' · ' + escapeHtml(row.title) : ''}</div>
            ${body}
          </div>
        `;
      }).join('');
      el.innerHTML = `<div class="card">${rows}</div>`;
    } catch (e) {
      el.innerHTML = `<div class="card"><div class="empty-state">Couldn't load history — check your connection and try again.</div></div>`;
    }
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabVote').classList.toggle('active', tab === 'vote');
    document.getElementById('tabPlan').classList.toggle('active', tab === 'plan');
    document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
    document.getElementById('voteView').style.display = tab === 'vote' ? 'block' : 'none';
    document.getElementById('planView').style.display = tab === 'plan' ? 'block' : 'none';
    document.getElementById('historyView').style.display = tab === 'history' ? 'block' : 'none';
    updateSyncBanner();
    if (tab === 'plan') renderPlanView();
    if (tab === 'history') renderHistoryView();
  }

  document.getElementById('tabVote').addEventListener('click', () => switchTab('vote'));
  document.getElementById('tabPlan').addEventListener('click', () => switchTab('plan'));
  document.getElementById('tabHistory').addEventListener('click', () => switchTab('history'));

  async function init() {
    await loadPoll();
    renderVoteView();

    let isFetching = false;
    let consecutiveFailures = 0;
    const BASE_INTERVAL = 8000;
    const MAX_INTERVAL = 60000;
    let pollTimer = null;

    async function poll() {
      if (document.hidden || isFetching) {
        scheduleNext();
        return;
      }
      isFetching = true;
      const beforeFailures = consecutiveFailures;
      await loadPoll(() => { consecutiveFailures++; });
      if (consecutiveFailures === beforeFailures) {
        consecutiveFailures = 0;
        if (currentTab === 'vote') {
          renderVoteView();
        } else {
          renderTitleBar();
        }
      }
      isFetching = false;
      scheduleNext();
    }

    function scheduleNext() {
      clearTimeout(pollTimer);
      const delay = Math.min(BASE_INTERVAL * Math.pow(2, consecutiveFailures), MAX_INTERVAL);
      pollTimer = setTimeout(poll, delay);
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        clearTimeout(pollTimer);
        poll();
      }
    });

    scheduleNext();
  }

  init();
</script>
</body>
